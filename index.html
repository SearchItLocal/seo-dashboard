<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO Dashboard - 120 Website Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100">
    <div id="root" class="min-h-screen">
        <div class="flex items-center justify-center min-h-screen p-4">
            <div class="bg-white rounded-lg shadow-xl p-8 max-w-2xl w-full">
                <h1 class="text-4xl font-bold mb-2 text-slate-900">📊 SEO Dashboard</h1>
                <p class="text-slate-600 mb-6">120 Website Portfolio Manager</p>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">
                            Google OAuth Token
                        </label>
                        <textarea
                            id="tokenInput"
                            placeholder="Paste your ya29.a0Aa... token"
                            class="w-full p-3 border border-slate-300 rounded-lg font-mono text-sm h-20"
                        ></textarea>
                    </div>
                    
                    <button
                        onclick="connectDashboard()"
                        class="w-full px-6 py-3 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-bold transition"
                    >
                        Connect & Load Dashboard
                    </button>
                </div>
                
                <div id="dashboard" style="display:none;" class="mt-8">
                    <div class="bg-gradient-to-br from-indigo-50 to-purple-50 p-8 rounded-xl border border-indigo-200 mb-8">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div>
                                <p class="text-sm font-bold text-indigo-600 uppercase">Total Portfolio QTV</p>
                                <p id="totalQTV" class="text-4xl font-black text-slate-900 mt-2">$0</p>
                            </div>
                            <div>
                                <p class="text-sm font-bold text-indigo-600 uppercase">Est. Monthly Leads</p>
                                <p id="totalLeads" class="text-4xl font-black text-slate-900 mt-2">0</p>
                            </div>
                            <div>
                                <p class="text-sm font-bold text-indigo-600 uppercase">Active Sites</p>
                                <p id="activeSites" class="text-4xl font-black text-slate-900 mt-2">0</p>
                            </div>
                        </div>
                    </div>
                    
                    <h2 class="text-2xl font-bold text-slate-900 mb-6">Your 120 Websites</h2>
                    <div id="sitesList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
                    
                    <div id="loadingIndicator" class="fixed bottom-8 right-8 bg-white p-6 rounded-xl shadow-lg border border-slate-200">
                        <div class="flex items-center gap-3">
                            <div class="animate-spin rounded-full h-5 w-5 border-b-2 border-indigo-600"></div>
                            <div>
                                <p class="font-bold text-slate-900">Syncing Data</p>
                                <p id="syncProgress" class="text-sm text-slate-500">Loading...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://seo-dashboard-api-ydk7.onrender.com';

        // Your 120 websites
        const WEBSITES = [
            'https://joyfulwarriorprincess.com.au/',
            'https://www.garyhamerinteriors.com.au/',
            'https://dkcdents.com.au',
            'http://astonandcopaintingdecorating.com.au',
            'http://petesupholsteryandtrimming.com.au/',
            'http://hivesdemolition.com.au',
            'http://pearlscreations.com.au/',
            'http://mrroadsidemobilemechanic.com.au/',
            'https://www.cessnocktankworks.com.au/',
            'https://thesoundlab.com.au/',
            'https://spidersecurity.com.au',
            'https://www.abcdbuilder.com.au/',
            'http://blackwoodosteopathy.com.au',
            'http://livingconsciously.com.au',
            'http://mountainhollowragdolls.com.au',
            'https://chihouseclinic.com/',
            'https://glengilbertsonfloorsanding.com.au/',
            'http://fiestaloca.com.au',
            'http://maryvalleypetcremation.com.au'
        ];

        async function connectDashboard() {
            const token = document.getElementById('tokenInput').value;
            if (!token.trim()) {
                alert('Please paste your OAuth token');
                return;
            }

            document.querySelector('[onclick="connectDashboard()"]').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('loadingIndicator').style.display = 'flex';

            const results = [];
            let successCount = 0;

            for (let i = 0; i < WEBSITES.length; i++) {
                const site = WEBSITES[i];
                document.getElementById('syncProgress').textContent = `${i + 1} of ${WEBSITES.length} sites`;

                try {
                    const response = await fetch(`${API_BASE}/api/gsc-portfolio/single/${encodeURIComponent(site)}`, {
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });

                    if (response.ok) {
                        const data = await response.json();
                        if (data.data && data.data.success) {
                            results.push({
                                url: site,
                                qtv: data.data.qtv || 0,
                                leads: data.data.leads || 0,
                                clicks: data.data.clicks || 0
                            });
                            successCount++;
                        }
                    }
                } catch (error) {
                    console.error(`Error fetching ${site}:`, error);
                }

                await new Promise(resolve => setTimeout(resolve, 100));
            }

            document.getElementById('loadingIndicator').style.display = 'none';

            // Update summary
            const totalQTV = results.reduce((sum, r) => sum + (r.qtv || 0), 0);
            const totalLeads = results.reduce((sum, r) => sum + (r.leads || 0), 0);

            document.getElementById('totalQTV').textContent = '$' + totalQTV.toLocaleString();
            document.getElementById('totalLeads').textContent = totalLeads.toLocaleString();
            document.getElementById('activeSites').textContent = successCount;

            // Display sites
            const sitesList = document.getElementById('sitesList');
            sitesList.innerHTML = results.map(site => `
                <div class="bg-white rounded-xl border border-slate-200 overflow-hidden hover:shadow-lg transition-shadow p-6">
                    <h3 class="font-bold text-slate-900 text-sm truncate mb-4">
                        ${site.url.replace(/https?:\/\//, '').replace(/\/$/, '')}
                    </h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <p class="text-xs text-slate-500 font-bold uppercase">QTV</p>
                            <p class="text-2xl font-black text-indigo-600 mt-1">$${(site.qtv || 0).toLocaleString()}</p>
                        </div>
                        <div>
                            <p class="text-xs text-slate-500 font-bold uppercase">Leads</p>
                            <p class="text-2xl font-black text-emerald-600 mt-1">${(site.leads || 0).toLocaleString()}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
